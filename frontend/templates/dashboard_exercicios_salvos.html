<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Exercícios Salvos | AdaptMath</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_exercicios_salvos.css') }}">
</head>

<body>

  <div class="container">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Voltar para Dashboard</a>

    <div class="header">
      <div>
        <h1>⭐ Exercícios Salvos</h1>

        <p>Visualize e gerencie todos os exercícios que você salvou para revisar depois.</p>
      </div>

      <div class="saved-count">0 Exercícios Salvos</div>
    </div>

    <section class="exercise-list" id="exerciseList"></section>
  </div>

  <div class="modal" id="viewModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📚 Visualizar Exercício</h2>

        <button class="close-btn" onclick="closeViewModal()">✕</button>
      </div>

      <div class="question-title" id="modalTitulo"></div>

      <div class="question-context" id="modalContexto"></div>

      <div class="question-image-container">
        <img id="modalImagem" class="question-image" style="display:none;max-width:100%;">
      </div>

      <div class="alternatives" id="modalAlternativas"></div>
    </div>
  </div>

  <div class="modal" id="removeModal" style="display:none;">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <h2>⚠ Confirmar Remoção</h2>

        <button class="close-btn" onclick="closeRemoveModal()">✕</button>
      </div>

      <div class="confirm-text">Tem certeza que deseja remover este exercício da sua lista de salvos?</div>

      <div class="confirm-actions">
        <button class="cancel-btn" onclick="closeRemoveModal()">Cancelar</button>

        <button class="confirm-btn">Remover Exercício</button>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastFeedback" class="toast align-items-center text-white bg-primary border-0" role="alert"
      aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>

        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
          aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js">
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js">
  </script>

  <script type="module" src="{{ url_for('static', filename='js/dashboard_exercicios_salvos.js') }}">
  </script>

</body>

</html>
