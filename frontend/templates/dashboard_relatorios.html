<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Relatórios | AdaptMath</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_relatorio.css') }}">
</head>

<body>

  <div class="container">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Voltar para Dashboard</a>

    <div class="header">
      <div>
        <h1>Relatórios de Desempenho</h1>

        <p>Acompanhe sua evolução, pontos fortes e dificuldades identificadas pela IA.</p>
      </div>

      <button class="export-btn">📄 Exportar Relatório</button>
    </div>

    <section class="summary" id="summaryContainer"></section>

    <section class="grid">
      <div class="card chart-card">
        <h2>Evolução Mensal</h2>

        <div class="chart-container">
          <canvas id="monthlyChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>Desempenho por Área</h2>

        <div id="subjectsContainer"></div>
      </div>
    </section>

    <section class="insights" id="insightsContainer"></section>

    <section class="ai-analysis">
      <h2>🤖 Análise Inteligente da IA</h2>

      <div id="aiAnalysisContainer"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
    integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/dashboard_relatorio.js') }}"></script>

</body>

</html>
