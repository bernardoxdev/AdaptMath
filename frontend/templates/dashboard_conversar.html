<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Assistente IA | AdaptMath</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_conversar.css') }}">
</head>

<body>
  <aside class="sidebar">
    <div>
      <a href="{{ url_for('dashboard') }}" class="back-dashboard">← Voltar ao Dashboard</a>

      <div class="logo">AdaptMath</div>

      <button class="new-chat" id="btnNovaConversa">+ Nova Conversa</button>

      <div class="history-title">Conversas Recentes</div>

      <div class="history" id="historyContainer"></div>
    </div>

    <div class="bottom-info">
      <h3>🤖 IA Adaptativa</h3>

      <p>A IA aprende com seu desempenho para personalizar explicações, exercícios e planos de estudo.</p>
    </div>
  </aside>

  <main class="chat-container">
    <div class="chat-header">
      <button class="mobile-menu-btn" id="menuBtn">☰</button>

      <h1>Conversar com IA</h1>

      <div class="status">● Online</div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area" id="inputArea">
      <div class="input-box">
        <textarea id="messageInput" placeholder="Digite sua dúvida ou peça um plano de estudos..."></textarea>

        <button class="send-btn" id="btnEnviar">➤</button>
      </div>

      <div class="quick-actions">
        <button class="quick-btn">📚 Plano de Estudos</button>

        <button class="quick-btn">❓ Explicar Questão</button>

        <button class="quick-btn">🎯 Gerar Exercícios</button>

        <button class="quick-btn">📈 Ver Recomendações</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
    integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
    crossorigin="anonymous"></script>

  <script src="{{ url_for('static', filename='js/dashboard_conversar.js') }}"></script>
</body>

</html>
