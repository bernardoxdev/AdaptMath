<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Teste de Aptidão | AdaptMath</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/teste_aptidao.css') }}">
</head>

<body>

  <div class="container">
    <div class="header">
      <div class="title">
        <h1>Teste de Aptidão</h1>

        <p>
          Descubra quais áreas da matemática você domina
          e personalize sua experiência de aprendizado.
        </p>
      </div>

      <div class="progress-card">
        <span>Progresso</span>

        <div class="progress-bar">
          <div class="progress"></div>
        </div>

        <p style="margin-top:10px; color:#cbd5e1;">
          Questão <span id="nQuestao"></span> de <span id="qQuestao"></span>
        </p>
      </div>
    </div>

    <div class="question-card">
      <div class="question-info">
        <div class="badge" id="qStyle"></div>

        <div class="difficulty">
          Dificuldade: <span id="qDificuldade"></span>
        </div>
      </div>

      <div class="question-title" id="qTitulo"></div>

      <div class="context" id="qContexto"></div>

      <div class="question-image-container">
        <img id="qImagem" class="question-image" style="display:none;">
      </div>

      <div class="alternatives" id="qAlternativas"></div>

      <div class="actions">
        <div>
          <button class="hint" onclick="showHint()">🤖 Pedir Dica para IA</button>

          <button class="secondary-btn" id="qSalvar">⭐ Salvar Questão</button>

          <button class="secondary-btn danger" id="btnReportar">🚨 Reportar Erro</button>
        </div>

        <button class="next" id="proximaQuestao">
          Próxima Questão →
        </button>
      </div>
    </div>

    <div class="ai-card">
      <h3>
        🤖 IA Adaptativa
      </h3>

      <p id="ai-text">
        A IA está analisando seu desempenho para identificar
        seus pontos fortes e dificuldades em matemática.
      </p>
    </div>
  </div>

  <div class="modal fade" id="reportModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">🚩 Reportar Problema</h5>

          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <label class="form-label">Tipo do problema</label>

          <select id="reportTipo" class="form-select">
            <option value="enunciado">Enunciado incorreto</option>
            <option value="alternativa">Alternativa incorreta</option>
            <option value="imagem">Imagem quebrada</option>
            <option value="gabarito">Gabarito incorreto</option>
            <option value="outro">Outro</option>
          </select>

          <div class="mt-3">
            <label class="form-label">Descrição</label>

            <textarea id="reportDescricao" class="form-control" rows="4">
          </textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

          <button type="button" class="btn btn-danger" id="btnEnviarReporte">Enviar Reporte</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastFeedback" class="toast align-items-center text-white bg-primary border-0" role="alert"
      aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>

        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
          aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
    integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
    crossorigin="anonymous"></script>
  <script type="module" src="{{ url_for('static', filename='js/teste_aptidao.js') }}"></script>
</body>

</html>
